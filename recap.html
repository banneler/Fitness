<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#020617">
    <title>Session Recap | Constellation</title>

    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/exercise-library.js"></script>
    <script src="js/heatmap.js"></script>
    <script src="js/animal-volume.js"></script>
    <script src="js/social.js"></script>
    <style>
        [v-cloak] { display: none !important; }
        body { background-color: #020617; color: white; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .loading-mask { position: fixed; inset: 0; background: #020617; z-index: 999; display: flex; align-items: center; justify-content: center; }
        .recap-card-host { width: 100%; max-width: 380px; margin: 0 auto; }
        .recap-card-host > div { width: 100% !important; max-width: 380px; }
        .toast-enter-active, .toast-leave-active { transition: all 0.5s ease; }
        .toast-enter-from, .toast-leave-to { opacity: 0; transform: translateY(20px); }
    </style>
</head>
<body class="font-sans antialiased text-slate-200">
<div id="app" v-cloak class="min-h-screen flex flex-col pb-10 pt-16 px-4">

    <div v-if="loading" class="loading-mask">
        <div class="animate-pulse flex flex-col items-center gap-4">
            <div class="w-10 h-10 rounded-full border-2 border-blue-500 border-t-transparent animate-spin"></div>
            <p class="text-[8px] font-black uppercase tracking-[0.4em] text-slate-600 italic">Loading Recap</p>
        </div>
    </div>

    <transition name="toast">
        <div v-if="toast.visible" class="fixed bottom-8 left-4 right-4 glass border-blue-500/30 p-4 rounded-2xl shadow-2xl z-[250] flex items-center gap-4">
            <div class="w-10 h-10 rounded-full bg-blue-500/20 flex items-center justify-center text-blue-400">
                <i data-lucide="check" class="w-5 h-5"></i>
            </div>
            <div>
                <h4 class="text-sm font-black italic text-white uppercase">{{ toast.title }}</h4>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider">{{ toast.message }}</p>
            </div>
        </div>
    </transition>

    <header v-if="!loading" class="flex items-center justify-between mb-6 max-w-[380px] mx-auto w-full">
        <button @click="goBack" class="w-11 h-11 glass rounded-2xl flex items-center justify-center border border-white/5 active:scale-95 transition-all text-slate-400 hover:text-white">
            <i data-lucide="arrow-left" class="w-5 h-5"></i>
        </button>
        <div class="text-center flex-1 px-3">
            <p class="text-[8px] font-black uppercase tracking-[0.3em] text-slate-500">Session Recap</p>
            <p v-if="sessionDate" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{{ sessionDate }}</p>
        </div>
        <div class="w-11"></div>
    </header>

    <main v-if="!loading && !error" class="flex-1 w-full max-w-[380px] mx-auto">
        <div ref="cardHost" class="recap-card-host" v-html="cardHtml"></div>

        <button @click="shareRecap" :disabled="sharing" class="mt-6 w-full py-4 rounded-2xl bg-blue-600 text-white font-black text-xs uppercase tracking-widest flex items-center justify-center gap-2 shadow-lg shadow-blue-900/30 active:scale-[0.98] transition-all disabled:opacity-50">
            <i data-lucide="share" class="w-4 h-4"></i>
            {{ sharing ? 'Preparing…' : 'Share Recap' }}
        </button>
    </main>

    <div v-if="!loading && error" class="flex-1 flex flex-col items-center justify-center text-center px-6">
        <i data-lucide="alert-circle" class="w-12 h-12 text-slate-600 mb-4"></i>
        <h2 class="text-lg font-black italic uppercase text-white mb-2">Recap Not Found</h2>
        <p class="text-xs text-slate-500 mb-6">{{ error }}</p>
        <button @click="goBack" class="px-6 py-3 rounded-xl bg-blue-600 text-white font-black text-xs uppercase">Back to Tracker</button>
    </div>
</div>

<script>
const { createApp } = Vue;
const _client = supabase.createClient('https://mvoyrchefjcpjkdtezmz.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12b3lyY2hlZmpjcGprZHRlem16Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjgwNjkxNzksImV4cCI6MjA4MzY0NTE3OX0.o_dh0rMw0RPYWJjn3ssA6OkKY8udy5vhqVQzN50uvEQ');

createApp({
    data() {
        return {
            loading: true,
            error: null,
            sessionDate: '',
            cardHtml: '',
            sharePayload: null,
            sharing: false,
            toast: { visible: false, title: '', message: '' }
        };
    },
    async mounted() {
        const params = new URLSearchParams(window.location.search);
        const startTime = params.get('t');
        const anchorId = params.get('id');
        if (!startTime && !anchorId) {
            this.error = 'No session specified.';
            this.loading = false;
            this.$nextTick(() => lucide.createIcons());
            return;
        }

        try {
            const { data: { session } } = await _client.auth.getSession();
            if (!session) { window.location.href = 'index.html'; return; }

            const [{ data: profile }, { data: logs, error: logsError }, library] = await Promise.all([
                _client.from('profiles').select('full_name').eq('id', session.user.id).maybeSingle(),
                _client.from('workout_logs').select('*').eq('user_id', session.user.id).order('created_at', { ascending: false }),
                FitnessExerciseLibrary.fetch(_client).catch(() => [])
            ]);

            if (logsError) throw logsError;

            const sessionLogs = FitnessSocial.findSessionLogs(logs || [], startTime, 3600000, anchorId);
            if (!sessionLogs.length) {
                this.error = 'This workout session could not be loaded.';
                this.loading = false;
                this.$nextTick(() => lucide.createIcons());
                return;
            }

            const firstLog = sessionLogs[0];
            this.sessionDate = new Date(firstLog.created_at).toLocaleDateString('en-US', {
                weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
            });

            const stats = FitnessSocial.computeFromSessionLogs(sessionLogs, {
                protocol_name: firstLog.protocol_name,
                duration: firstLog.duration_seconds || 0
            });
            const heatmapStatuses = FitnessHeatmap.compute(logs || [], library || []);
            const streak = FitnessSocial.calculateStreak(logs || []);

            this.sharePayload = {
                athleteName: profile?.full_name || '',
                protocolName: stats.protocolName,
                durationSeconds: stats.durationSeconds,
                tonnage: stats.tonnage,
                setCount: stats.setCount,
                exerciseCount: stats.exerciseCount,
                liftLines: stats.liftLines,
                streak,
                heatmapStatuses,
                animalSeed: startTime
            };

            const enriched = await FitnessSocial.enrichShareOptions(this.sharePayload);
            this.cardHtml = FitnessSocial.buildShareCardHtml(enriched);
        } catch (e) {
            console.error(e);
            this.error = 'Something went wrong loading this recap.';
        }

        this.loading = false;
        this.$nextTick(() => lucide.createIcons());
    },
    updated() { this.$nextTick(() => lucide.createIcons()); },
    methods: {
        goBack() {
            if (document.referrer && document.referrer.includes('tracker.html')) {
                window.location.href = 'tracker.html';
            } else {
                window.location.href = 'tracker.html';
            }
        },
        showToast(title, message) {
            this.toast = { visible: true, title, message };
            setTimeout(() => { this.toast.visible = false; }, 3000);
        },
        async shareRecap() {
            if (!this.sharePayload || this.sharing) return;
            this.sharing = true;
            try {
                const result = await FitnessSocial.shareRecap(this.sharePayload);
                if (result === 'shared-image' || result === 'shared') this.showToast('Sent!', 'Workout recap shared.');
                else if (result === 'clipboard') this.showToast('Copied!', 'Workout recap copied to clipboard.');
                else if (result === 'cancelled') { /* user dismissed */ }
                else this.showToast('Share', 'Could not share — try again.');
            } finally {
                this.sharing = false;
            }
        }
    }
}).mount('#app');
</script>
</body>
</html>
