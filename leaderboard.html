<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Leaderboard | BA Fitness</title>
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="js/giphy-config.js"></script>
    <script src="js/social.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="js/arena-prs.js"></script>
    <script src="js/arena-history.js"></script>
    <script src="js/user-prefs.js"></script>
    <script src="js/bottom-nav.js"></script>
    <style>
        [v-cloak] { display: none !important; }
        body { background-color: #020617; color: white; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .rank-1 { background: linear-gradient(135deg, rgba(234, 179, 8, 0.2), rgba(234, 179, 8, 0.05)); border: 1px solid rgba(234, 179, 8, 0.3); }
        .rank-2 { background: linear-gradient(135deg, rgba(148, 163, 184, 0.2), rgba(148, 163, 184, 0.05)); border: 1px solid rgba(148, 163, 184, 0.3); }
        .rank-3 { background: linear-gradient(135deg, rgba(180, 83, 9, 0.2), rgba(180, 83, 9, 0.05)); border: 1px solid rgba(180, 83, 9, 0.3); }
        
        .gold-text { color: #facc15; text-shadow: 0 0 10px rgba(250, 204, 21, 0.5); }
        .silver-text { color: #cbd5e1; text-shadow: 0 0 10px rgba(203, 213, 225, 0.5); }
        .bronze-text { color: #fdba74; text-shadow: 0 0 10px rgba(253, 186, 116, 0.5); }
        
        @keyframes pulse-orange {
            0%, 100% { filter: drop-shadow(0 0 2px #f97316); }
            50% { filter: drop-shadow(0 0 8px #f97316); }
        }
        .fire-anim { animation: pulse-orange 2s infinite; }

        @keyframes crown-descend-drop {
            0% { transform: translateY(-140px) scale(1.35); opacity: 0; }
            55% { transform: translateY(10px) scale(1.08); opacity: 1; }
            75% { transform: translateY(-6px) scale(1); }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }
        @keyframes coronation-phase-in {
            from { opacity: 0; transform: scale(0.92); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes coronation-glow-pulse {
            0%, 100% { opacity: 0.35; }
            50% { opacity: 0.7; }
        }

        .crown-descend-anim { animation: crown-descend-drop 1.2s ease-out forwards; }
        .coronation-phase-in { animation: coronation-phase-in 0.35s ease-out forwards; }
        .coronation-glow { animation: coronation-glow-pulse 2s ease-in-out infinite; }

        .fade-enter-active, .fade-leave-active { transition: opacity 0.4s ease; }
        .fade-enter-from, .fade-leave-to { opacity: 0; }

        .like-btn-active { color: #f472b6; }
        .like-btn-active i { fill: #f472b6; }
        .tab-active { color: #a855f7; }
        .tab-active i { stroke-width: 3px; filter: drop-shadow(0 0 8px #a855f7); }
        .comment-gif { display: block; }
        .comment-text { white-space: pre-wrap; }
        .pr-card-glow { box-shadow: 0 0 30px rgba(250, 204, 21, 0.08); }
        .leader-avatar-crown {
            position: absolute;
            top: -1.25rem;
            left: 50%;
            transform: translateX(-50%) rotate(12deg);
            z-index: 10;
            pointer-events: none;
            filter: drop-shadow(0 4px 3px rgb(0 0 0 / 0.25));
        }
    </style>
</head>
<body class="font-sans antialiased bg-slate-950">
<div id="app" v-cloak class="min-h-screen flex flex-col p-6 pb-32 pt-16">

    <transition name="fade">
        <div v-if="arenaCoronation" @click="dismissCoronation" class="fixed inset-0 z-[200] bg-black/95 flex flex-col items-center justify-center px-8 cursor-pointer overflow-hidden">
            <div class="absolute inset-0 coronation-glow pointer-events-none" :style="{ background: `radial-gradient(circle at 50% 40%, ${arenaCoronation.color}44, transparent 65%)` }"></div>

            <div class="flex flex-col items-center relative z-10 w-full max-w-sm mx-auto text-center coronation-phase-in">
                <div class="text-[130px] crown-descend-anim leading-none select-none">👑</div>
                <h2 class="mt-8 font-black italic uppercase leading-tight animate-pulse">
                    <span class="block text-2xl tracking-[0.14em]" :style="{ color: arenaCoronation.color }">The Crown</span>
                    <span class="block text-3xl tracking-[0.1em] text-white mt-1">Is Yours</span>
                </h2>
                <div class="glass mt-8 w-full rounded-2xl px-5 py-4 border border-white/10 shadow-xl" :style="{ borderColor: arenaCoronation.color + '33' }">
                    <p class="text-[9px] font-black uppercase tracking-[0.35em] text-slate-500 mb-2">Arena Rank · Last 7 Days</p>
                    <p class="text-base font-black italic uppercase tracking-wide" :style="{ color: arenaCoronation.color }">
                        #1 · {{ arenaCoronation.title }}
                        <span class="ml-1">{{ arenaCoronation.emoji }}</span>
                    </p>
                    <p class="text-[10px] font-bold uppercase tracking-[0.2em] text-slate-400 mt-2">{{ arenaCoronation.caption }}</p>
                </div>
                <p class="text-[9px] font-bold uppercase tracking-[0.25em] text-slate-600 mt-6">Tap to dismiss</p>
            </div>
        </div>
    </transition>

    <transition name="fade">
        <div v-if="toast" class="fixed top-6 left-6 right-6 glass border-purple-500/30 p-4 rounded-2xl shadow-2xl z-[250] text-center">
            <p class="text-xs font-bold text-purple-300">{{ toast }}</p>
        </div>
    </transition>

    <header class="mb-8 flex items-center justify-between">
        <div>
            <h1 class="text-3xl font-black italic text-white uppercase tracking-tighter leading-none">
                THE <span class="text-purple-500">ARENA</span>
            </h1>
            <p class="text-[8px] font-bold text-slate-500 uppercase tracking-[0.3em]">Last 7 Days Performance</p>
        </div>
        <a href="arena-history.html" class="flex flex-col items-center gap-1 px-3 py-2 rounded-2xl bg-yellow-500/10 border border-yellow-500/25 text-yellow-400 active:scale-95 transition-all" title="Rank history">
            <span class="text-lg leading-none">🏆</span>
            <span class="text-[7px] font-black uppercase tracking-widest">History</span>
        </a>
    </header>

    <main class="space-y-4">
        <div class="glass p-1 rounded-xl grid grid-cols-4 gap-0.5 mb-6">
            <button @click="setMetric('volume')" class="min-w-0 py-2.5 px-1 rounded-lg text-[8px] font-black uppercase tracking-wide text-center transition-all" :class="metric === 'volume' ? 'bg-purple-600 text-white shadow-lg' : 'text-slate-500'">Volume</button>
            <button @click="setMetric('sessions')" class="min-w-0 py-2.5 px-1 rounded-lg text-[8px] font-black uppercase tracking-wide text-center transition-all" :class="metric === 'sessions' ? 'bg-purple-600 text-white shadow-lg' : 'text-slate-500'">Consistency</button>
            <button @click="setMetric('streak')" class="min-w-0 py-2.5 px-1 rounded-lg text-[8px] font-black uppercase tracking-wide text-center transition-all" :class="metric === 'streak' ? 'bg-orange-600 text-white shadow-lg' : 'text-slate-500'">Streak</button>
            <button @click="setMetric('prs')" class="min-w-0 py-2.5 px-1 rounded-lg text-[8px] font-black uppercase tracking-wide text-center transition-all" :class="metric === 'prs' ? 'bg-yellow-500 text-slate-950 shadow-lg' : 'text-slate-500'">PRs</button>
        </div>

        <template v-if="metric === 'prs'">
            <p v-if="prSocialUnavailable" class="text-[10px] text-amber-500/80 font-bold uppercase tracking-wider text-center px-4 mb-2">
                Run supabase/arena_prs_schema.sql for cheers & comments on PRs
            </p>
            <p v-else-if="prComputedFallback" class="text-[10px] text-slate-500 font-bold uppercase tracking-wider text-center px-4 mb-2">
                Live tally from workout logs this week
            </p>

            <div v-if="prEvents.length === 0" class="glass rounded-3xl p-10 text-center">
                <p class="text-sm font-black italic text-slate-400 uppercase">No PRs yet this week</p>
                <p class="text-[10px] text-slate-600 mt-2 uppercase tracking-wider">Hit a new max and claim the board</p>
            </div>

            <div v-for="pr in prEvents" :key="pr.id" class="glass rounded-3xl p-5 pr-card-glow border border-yellow-500/10 mb-4">
                <div class="flex items-start gap-4 mb-4">
                    <div class="w-11 h-11 rounded-full bg-slate-800 border border-white/10 flex items-center justify-center text-[10px] font-black text-slate-400 flex-shrink-0">{{ prInitials(pr.user_id) }}</div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 flex-wrap">
                            <span class="font-black italic uppercase text-white text-sm">{{ prName(pr.user_id) }}</span>
                            <span v-if="pr.user_id === session?.user?.id" class="text-[8px] bg-white/10 px-1.5 py-0.5 rounded text-slate-400 font-bold uppercase">You</span>
                        </div>
                        <p class="text-[10px] font-black uppercase tracking-wider text-yellow-400/90 mt-0.5">{{ pr.exercise_name }}</p>
                        <p class="text-[8px] text-slate-600 font-bold uppercase tracking-widest mt-1">{{ prFormatWhen(pr.achieved_at) }}</p>
                    </div>
                    <div class="text-right flex-shrink-0">
                        <div class="text-2xl font-black italic text-yellow-400 leading-none">{{ formatNumber(pr.weight) }}</div>
                        <div class="text-[8px] text-slate-500 font-bold uppercase tracking-widest">LBS × {{ pr.reps || '—' }}</div>
                        <div v-if="prDelta(pr)" class="text-[9px] font-black text-green-400 mt-1">{{ prDelta(pr) }}</div>
                    </div>
                </div>
                <div v-if="session && !pr._computed" class="flex items-center gap-2 pt-3 border-t border-white/5">
                    <button @click="togglePrLike(pr)" :disabled="socialBusy" class="flex items-center gap-1.5 px-3 py-2 rounded-xl bg-slate-950/50 border border-white/5 transition-all active:scale-95 disabled:opacity-50" :class="isPrLiked(pr.id) ? 'like-btn-active border-pink-500/30' : 'text-slate-400 hover:text-pink-400'">
                        <i data-lucide="heart" class="w-4 h-4"></i>
                        <span class="text-[10px] font-black">{{ prLikeCount(pr.id) || '' }}</span>
                    </button>
                    <button @click="togglePrComments(pr.id)" class="flex items-center gap-1.5 px-3 py-2 rounded-xl bg-slate-950/50 border border-white/5 text-slate-400 hover:text-blue-400 transition-all active:scale-95">
                        <i data-lucide="message-circle" class="w-4 h-4"></i>
                        <span class="text-[10px] font-black">{{ prCommentCount(pr.id) || '' }}</span>
                    </button>
                </div>
                <div v-if="expandedPr === pr.id && !pr._computed" class="space-y-3 pt-3 mt-1">
                    <div v-if="commentThreadsForPr(pr.id).length === 0" class="text-[10px] text-slate-600 italic px-1">Be the first to hype this PR!</div>
                    <template v-for="comment in commentThreadsForPr(pr.id)" :key="comment.id">
                        <div class="flex gap-2 items-start">
                            <div class="w-7 h-7 rounded-full bg-slate-800 flex items-center justify-center text-[9px] font-black text-slate-400 flex-shrink-0">{{ prInitials(comment.author_user_id) }}</div>
                            <div class="flex-1 min-w-0">
                                <div class="flex items-baseline gap-2">
                                    <span class="text-[10px] font-black text-slate-300 uppercase">{{ prName(comment.author_user_id) }}</span>
                                    <span class="text-[8px] text-slate-600">{{ prFormatWhen(comment.created_at) }}</span>
                                </div>
                                <div class="text-xs text-slate-400 break-words" v-html="renderCommentHtml(comment.body)"></div>
                                <div v-if="session" class="flex items-center gap-3 mt-1.5">
                                    <button @click="togglePrCommentLike(comment.id)" :disabled="socialBusy" class="flex items-center gap-1 text-[9px] font-black uppercase tracking-wider transition-colors" :class="isPrCommentLiked(comment.id) ? 'text-pink-400' : 'text-slate-500 hover:text-pink-400'">
                                        <i data-lucide="heart" class="w-3 h-3"></i>
                                        {{ prCommentLikeCount(comment.id) || '' }}
                                    </button>
                                    <button @click="startPrReply(pr.id, comment.id)" class="text-[9px] font-black uppercase tracking-wider text-slate-500 hover:text-blue-400">Reply</button>
                                </div>
                            </div>
                        </div>
                        <div v-for="reply in comment.replies" :key="reply.id" class="flex gap-2 items-start ml-8">
                            <div class="w-6 h-6 rounded-full bg-slate-800 flex items-center justify-center text-[8px] font-black text-slate-500 flex-shrink-0">{{ prInitials(reply.author_user_id) }}</div>
                            <div class="flex-1 min-w-0">
                                <div class="text-xs text-slate-500 break-words" v-html="renderCommentHtml(reply.body)"></div>
                                <button v-if="session" @click="togglePrCommentLike(reply.id)" :disabled="socialBusy" class="flex items-center gap-1 mt-1 text-[9px] font-black uppercase tracking-wider transition-colors" :class="isPrCommentLiked(reply.id) ? 'text-pink-400' : 'text-slate-500 hover:text-pink-400'">
                                    <i data-lucide="heart" class="w-3 h-3"></i>
                                    {{ prCommentLikeCount(reply.id) || '' }}
                                </button>
                            </div>
                        </div>
                    </template>
                    <div v-if="session" class="flex gap-2">
                        <input v-model="prCommentDraft[pr.id]" @keyup.enter="postPrComment(pr.id)" maxlength="280" placeholder="Celebrate this PR..." class="flex-1 bg-slate-950 border border-white/10 rounded-xl px-3 py-2.5 text-xs text-white outline-none focus:border-yellow-500">
                        <button @click="postPrComment(pr.id)" :disabled="!canPostPrComment(pr.id) || socialBusy" class="px-4 py-2 rounded-xl bg-yellow-500 text-slate-950 text-[10px] font-black uppercase disabled:opacity-40">Post</button>
                    </div>
                </div>
            </div>
        </template>

        <template v-else>
        <p v-if="socialUnavailable" class="text-[10px] text-amber-500/80 font-bold uppercase tracking-wider text-center px-4">
            Cheers & comments need the arena tables — run supabase/social_schema.sql
        </p>

        <div class="space-y-4">
            <div v-for="(user, index) in sortedUsers" :key="user.user_id" class="relative p-4 rounded-3xl flex flex-col gap-3" :class="getRankClass(index)">
                <div class="flex items-center gap-4">
                    <div class="w-8 h-8 flex-shrink-0 flex items-center justify-center font-black italic text-lg" :class="getRankColor(index)">{{ index + 1 }}</div>
                    <div class="relative">
                        <div class="w-12 h-12 rounded-full flex items-center justify-center bg-slate-800 border border-white/10 overflow-hidden">
                            <img v-if="user.avatar_url" :src="user.avatar_url" class="w-full h-full object-cover">
                            <span v-else class="font-black text-slate-500">{{ user.initials || '??' }}</span>
                        </div>
                        <div v-show="index === 0" class="leader-avatar-crown text-2xl leading-none select-none">👑</div>
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 flex-wrap">
                            <span class="font-bold text-white uppercase italic text-sm truncate">{{ user.full_name || 'Anonymous' }}</span>
                            <span v-if="user.user_id === session?.user?.id" class="text-[8px] bg-white/10 px-1.5 py-0.5 rounded text-slate-400 font-bold uppercase">You</span>
                        </div>
                        <div class="text-[10px] font-bold uppercase tracking-wider" :class="metric === 'streak' ? 'text-orange-400 flex items-center gap-1' : 'text-slate-500'">
                            <span v-if="metric === 'streak'" class="fire-anim">🔥</span>
                            {{ getMetricLabel() }}
                        </div>
                    </div>
                    <div class="text-right flex-shrink-0">
                        <div class="font-black italic text-xl" :class="metric === 'streak' ? 'text-orange-500 fire-anim' : 'text-white'">{{ getScore(user) }}</div>
                        <div class="text-[8px] text-slate-500 font-bold uppercase tracking-widest">{{ getUnit() }}</div>
                    </div>
                </div>

                <div v-if="session" class="flex items-center gap-2 pt-1 border-t border-white/5">
                    <button @click="toggleLike(user.user_id)" :disabled="socialBusy" class="flex items-center gap-1.5 px-3 py-2 rounded-xl bg-slate-950/50 border border-white/5 transition-all active:scale-95 disabled:opacity-50" :class="isLiked(user.user_id) ? 'like-btn-active border-pink-500/30' : 'text-slate-400 hover:text-pink-400'">
                        <i data-lucide="heart" class="w-4 h-4"></i>
                        <span class="text-[10px] font-black">{{ likeCount(user.user_id) || '' }}</span>
                    </button>
                    <button @click="toggleComments(user.user_id)" class="flex items-center gap-1.5 px-3 py-2 rounded-xl bg-slate-950/50 border border-white/5 text-slate-400 hover:text-blue-400 transition-all active:scale-95">
                        <i data-lucide="message-circle" class="w-4 h-4"></i>
                        <span class="text-[10px] font-black">{{ commentCount(user.user_id) || '' }}</span>
                    </button>
                    <button v-if="user.user_id === session.user.id && metric === 'streak' && user.current_streak > 0" @click="shareStreak(user)" class="ml-auto flex items-center gap-1.5 px-3 py-2 rounded-xl bg-orange-500/10 border border-orange-500/20 text-orange-400 transition-all active:scale-95">
                        <i data-lucide="share" class="w-3.5 h-3.5"></i>
                        <span class="text-[9px] font-black uppercase">Share</span>
                    </button>
                    <button v-else-if="user.user_id === session.user.id" @click="shareRanking(user, index)" class="ml-auto flex items-center gap-1.5 px-3 py-2 rounded-xl bg-purple-500/10 border border-purple-500/20 text-purple-400 transition-all active:scale-95">
                        <i data-lucide="share" class="w-3.5 h-3.5"></i>
                        <span class="text-[9px] font-black uppercase">Share</span>
                    </button>
                </div>

                <div v-if="expandedUser === user.user_id" class="space-y-3 pt-1">
                    <div v-if="commentThreadsFor(user.user_id).length === 0" class="text-[10px] text-slate-600 italic px-1">No cheers yet — be the first!</div>
                    <template v-for="comment in commentThreadsFor(user.user_id)" :key="comment.id">
                        <div class="flex gap-2 items-start">
                            <div class="w-7 h-7 rounded-full bg-slate-800 flex items-center justify-center text-[9px] font-black text-slate-400 flex-shrink-0">{{ authorInitials(comment.author_user_id) }}</div>
                            <div class="flex-1 min-w-0">
                                <div class="flex items-baseline gap-2">
                                    <span class="text-[10px] font-black text-slate-300 uppercase">{{ authorName(comment.author_user_id) }}</span>
                                    <span class="text-[8px] text-slate-600">{{ FitnessSocial.formatCommentTime(comment.created_at) }}</span>
                                </div>
                                <div class="text-xs text-slate-400 break-words" v-html="renderCommentHtml(comment.body)"></div>
                                <div v-if="session" class="flex items-center gap-3 mt-1.5">
                                    <button @click="toggleCommentLike(comment.id)" :disabled="socialBusy" class="flex items-center gap-1 text-[9px] font-black uppercase tracking-wider transition-colors" :class="isCommentLiked(comment.id) ? 'text-pink-400' : 'text-slate-500 hover:text-pink-400'">
                                        <i data-lucide="heart" class="w-3 h-3"></i>
                                        {{ commentLikeCount(comment.id) || '' }}
                                    </button>
                                    <button @click="startReply(user.user_id, comment.id)" class="text-[9px] font-black uppercase tracking-wider text-slate-500 hover:text-blue-400">Reply</button>
                                </div>
                            </div>
                            <button v-if="session && comment.author_user_id === session.user.id" @click="deleteComment(comment)" :disabled="socialBusy" class="flex-shrink-0 w-7 h-7 rounded-lg bg-slate-900/80 border border-white/5 flex items-center justify-center text-slate-500 hover:text-red-400 hover:border-red-500/30 active:scale-95 disabled:opacity-40" title="Delete comment">
                                <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                            </button>
                        </div>
                        <div v-for="reply in comment.replies" :key="reply.id" class="flex gap-2 items-start ml-8">
                            <div class="w-6 h-6 rounded-full bg-slate-800 flex items-center justify-center text-[8px] font-black text-slate-500 flex-shrink-0">{{ authorInitials(reply.author_user_id) }}</div>
                            <div class="flex-1 min-w-0">
                                <div class="flex items-baseline gap-2">
                                    <span class="text-[10px] font-black text-slate-400 uppercase">{{ authorName(reply.author_user_id) }}</span>
                                    <span class="text-[8px] text-slate-600">{{ FitnessSocial.formatCommentTime(reply.created_at) }}</span>
                                </div>
                                <div class="text-xs text-slate-500 break-words" v-html="renderCommentHtml(reply.body)"></div>
                                <button v-if="session" @click="toggleCommentLike(reply.id)" :disabled="socialBusy" class="flex items-center gap-1 mt-1 text-[9px] font-black uppercase tracking-wider transition-colors" :class="isCommentLiked(reply.id) ? 'text-pink-400' : 'text-slate-500 hover:text-pink-400'">
                                    <i data-lucide="heart" class="w-3 h-3"></i>
                                    {{ commentLikeCount(reply.id) || '' }}
                                </button>
                            </div>
                            <button v-if="session && reply.author_user_id === session.user.id" @click="deleteComment(reply)" :disabled="socialBusy" class="flex-shrink-0 w-7 h-7 rounded-lg bg-slate-900/80 border border-white/5 flex items-center justify-center text-slate-500 hover:text-red-400 active:scale-95 disabled:opacity-40">
                                <i data-lucide="trash-2" class="w-3 h-3"></i>
                            </button>
                        </div>
                    </template>
                    <div v-if="session" class="space-y-2">
                        <p v-if="replyParent[user.user_id]" class="text-[9px] text-blue-400 font-bold uppercase tracking-wider">Replying to comment</p>
                        <div v-if="commentDraftPreview(user.user_id)" class="pl-1">
                            <img :src="commentDraftPreview(user.user_id)" alt="" class="max-w-[100px] max-h-[100px] rounded-xl object-cover border border-white/10">
                        </div>
                        <div class="flex gap-2">
                            <button @click="openGifPicker(user.user_id)" :disabled="socialBusy" class="flex-shrink-0 w-10 h-10 rounded-xl bg-slate-950 border border-white/10 flex items-center justify-center text-slate-400 hover:text-purple-400 hover:border-purple-500/40 active:scale-95 disabled:opacity-40" title="Add GIF">
                                <i data-lucide="image" class="w-4 h-4"></i>
                            </button>
                            <input v-model="commentDraft[user.user_id]" @keyup.enter="postComment(user.user_id)" maxlength="280" :placeholder="replyParent[user.user_id] ? 'Write a reply...' : 'Send encouragement...'" class="flex-1 bg-slate-950 border border-white/10 rounded-xl px-3 py-2.5 text-xs text-white outline-none focus:border-purple-500">
                            <button @click="postComment(user.user_id)" :disabled="!canPostComment(user.user_id) || socialBusy" class="px-4 py-2 rounded-xl bg-purple-600 text-white text-[10px] font-black uppercase disabled:opacity-40 active:scale-95">Post</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        </template>
    </main>

    <nav id="app-bottom-nav"></nav>

    <div v-if="gifPickerTarget" class="fixed inset-0 z-[200] flex items-end justify-center bg-black/75 backdrop-blur-sm" @click.self="closeGifPicker">
        <div class="w-full max-w-lg bg-slate-900 rounded-t-3xl border-t border-white/10 shadow-2xl flex flex-col max-h-[72vh] safe-area-bottom">
            <div class="flex items-center gap-2 p-4 border-b border-white/5">
                <input v-model="gifSearch" @input="onGifSearchInput" @keyup.enter="loadGifs(gifSearch)" type="search" placeholder="Search GIFs..." class="flex-1 bg-slate-950 border border-white/10 rounded-xl px-3 py-2.5 text-sm text-white outline-none focus:border-purple-500">
                <button @click="closeGifPicker" class="w-10 h-10 rounded-xl bg-slate-950 border border-white/10 flex items-center justify-center text-slate-400 hover:text-white active:scale-95">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
            <div class="flex-1 overflow-y-auto no-scrollbar p-4 pt-3">
                <p v-if="!gifSearch.trim()" class="text-[10px] font-bold uppercase tracking-wider text-purple-400/80 mb-3">Gym picks — search for anything</p>
                <div v-if="gifLoading" class="text-center text-slate-500 text-sm py-10">Loading GIFs...</div>
                <div v-else-if="gifResults.length === 0" class="text-center text-slate-500 text-sm py-10">No GIFs found</div>
                <div v-else class="grid grid-cols-3 gap-2">
                    <button v-for="gif in gifResults" :key="gif.id" @click="selectGif(gif)" class="rounded-xl overflow-hidden border border-white/5 bg-slate-950 active:scale-95 transition-transform">
                        <img :src="gif.previewUrl" :alt="gif.title" class="w-full h-24 object-cover">
                    </button>
                </div>
            </div>
            <p class="text-[9px] text-slate-600 text-center pb-4 px-4 uppercase tracking-widest font-bold">Powered by GIPHY</p>
        </div>
    </div>

</div>

<script>
    const { createApp } = Vue;
    const _client = supabase.createClient('https://mvoyrchefjcpjkdtezmz.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im12b3lyY2hlZmpjcGprZHRlem16Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjgwNjkxNzksImV4cCI6MjA4MzY0NTE3OX0.o_dh0rMw0RPYWJjn3ssA6OkKY8udy5vhqVQzN50uvEQ');

    createApp({
        data() {
            return {
                session: null,
                users: [],
                metric: 'volume',
                arenaCoronation: null,
                arenaCoronationTimer: null,
                likes: [],
                comments: [],
                profileMap: {},
                myLikeKeys: new Set(),
                commentDraft: {},
                replyParent: {},
                commentLikeCounts: {},
                myCommentLikes: new Set(),
                expandedUser: null,
                socialBusy: false,
                socialUnavailable: false,
                toast: '',
                gifPickerTarget: null,
                gifSearch: '',
                gifResults: [],
                gifLoading: false,
                gifSearchTimer: null,
                FitnessSocial,
                prEvents: [],
                prLikes: [],
                prComments: [],
                prCommentLikeCounts: {},
                myPrLikes: new Set(),
                myPrCommentLikes: new Set(),
                prCommentDraft: {},
                prReplyParent: {},
                expandedPr: null,
                prSocialUnavailable: false,
                prComputedFallback: false,
                prConfettiFired: false
            };
        },
        computed: {
            sortedUsers() {
                return [...this.users].sort((a, b) => {
                    if (this.metric === 'volume') return b.total_volume - a.total_volume;
                    if (this.metric === 'sessions') return b.sessions_count - a.sessions_count;
                    return b.current_streak - a.current_streak;
                });
            },
            groupedComments() {
                return FitnessSocial.groupComments(this.comments);
            },
            likeCounts() {
                const counts = {};
                this.likes.forEach(row => {
                    counts[row.target_user_id] = (counts[row.target_user_id] || 0) + 1;
                });
                return counts;
            },
            prCommentsByPr() {
                const map = {};
                this.prComments.forEach(c => {
                    if (!map[c.pr_id]) map[c.pr_id] = [];
                    map[c.pr_id].push(c);
                });
                return map;
            },
            prLikeCounts() {
                const c = {};
                this.prLikes.forEach(r => { c[r.pr_id] = (c[r.pr_id] || 0) + 1; });
                return c;
            }
        },
        watch: {
            metric(m) {
                this.expandedUser = null;
                if (m === 'prs') {
                    this.fetchPrFeed();
                    if (!this.prConfettiFired) {
                        FitnessArenaPrs.fireConfettiCanon();
                        this.prConfettiFired = true;
                    }
                } else {
                    this.fetchSocial();
                }
            }
        },
        async mounted() {
            const { data: { session } } = await _client.auth.getSession();
            if (!session) { window.location.href = 'index.html'; return; }
            this.session = session;

            await FitnessUserPrefs.hydrate(_client, session.user.id);
            if (!FitnessUserPrefs.guardPage('arena')) return;

            const params = new URLSearchParams(window.location.search);
            if (params.get('tab') === 'prs') this.metric = 'prs';

            await Promise.all([this.fetchLeaderboard(), this.fetchProfiles()]);
            await FitnessArenaHistory.seedOpeningBoardIfEmpty(_client, this.users);
            await FitnessArenaHistory.recordChanges(_client, this.users);
            if (this.metric === 'prs') {
                await this.fetchPrFeed();
                FitnessArenaPrs.fireConfettiCanon();
                this.prConfettiFired = true;
            } else {
                await this.fetchSocial();
            }
            this.$nextTick(() => {
                FitnessBottomNav.mount('app-bottom-nav', 'arena');
                lucide.createIcons();
                if (this.metric !== 'prs') this.maybeShowCoronation();
            });
        },
        updated() { this.$nextTick(() => lucide.createIcons()); },
        methods: {
            setMetric(m) {
                if (this.metric === m) return;
                this.metric = m;
                if (m !== 'prs') this.$nextTick(() => this.maybeShowCoronation());
            },
            maybeShowCoronation() {
                if (!this.session || !this.users.length || this.metric === 'prs') return;
                if (!FitnessSocial.isArenaLeader(this.users, this.session.user.id, this.metric)) return;
                this.showCoronation(FitnessSocial.buildCoronationEvent(this.metric));
            },
            showCoronation(event) {
                clearTimeout(this.arenaCoronationTimer);
                this.arenaCoronation = event;
                this.arenaCoronationTimer = setTimeout(() => this.dismissCoronation(), 4500);
            },
            dismissCoronation() {
                clearTimeout(this.arenaCoronationTimer);
                this.arenaCoronation = null;
            },
            async fetchLeaderboard() {
                const { data, error } = await _client.from('leaderboard').select('*');
                if (error) console.error(error);
                else this.users = data || [];
            },
            async fetchProfiles() {
                const { data } = await _client.from('profiles').select('id, full_name, initials, avatar_url');
                const map = {};
                (data || []).forEach(p => { map[p.id] = p; });
                this.profileMap = map;
            },
            async fetchSocial() {
                if (!this.session || this.metric === 'prs') return;
                const [likesRes, commentsRes, commentLikesRes] = await Promise.all([
                    _client.from('arena_likes').select('id, target_user_id, actor_user_id, context').eq('context', this.metric),
                    _client.from('arena_comments').select('*').eq('context', this.metric).order('created_at', { ascending: true }),
                    _client.from('arena_comment_likes').select('comment_id, actor_user_id')
                ]);
                if (likesRes.error?.code === '42P01' || commentsRes.error?.code === '42P01') {
                    this.socialUnavailable = true;
                    return;
                }
                this.socialUnavailable = false;
                this.likes = likesRes.data || [];
                this.comments = commentsRes.data || [];
                const clState = FitnessSocial.buildCommentLikeState(
                    commentLikesRes.error ? [] : (commentLikesRes.data || []),
                    this.session.user.id
                );
                this.commentLikeCounts = clState.counts;
                this.myCommentLikes = clState.mine;
                const mine = new Set();
                this.likes.forEach(row => {
                    if (row.actor_user_id === this.session.user.id) {
                        mine.add(FitnessSocial.likeKey(row.target_user_id, row.context));
                    }
                });
                this.myLikeKeys = mine;
            },
            likeCount(userId) {
                return this.likeCounts[userId] || 0;
            },
            commentCount(userId) {
                return this.commentThreadsFor(userId).length;
            },
            isLiked(userId) {
                return this.myLikeKeys.has(FitnessSocial.likeKey(userId, this.metric));
            },
            commentsFor(userId) {
                return this.groupedComments[userId] || [];
            },
            commentThreadsFor(userId) {
                return FitnessSocial.buildCommentThreads(this.groupedComments[userId] || []);
            },
            isCommentLiked(commentId) {
                return this.myCommentLikes.has(commentId);
            },
            commentLikeCount(commentId) {
                return this.commentLikeCounts[commentId] || 0;
            },
            startReply(userId, parentId) {
                this.replyParent[userId] = parentId;
                this.expandedUser = userId;
            },
            authorName(userId) {
                return this.profileMap[userId]?.full_name || 'Athlete';
            },
            authorInitials(userId) {
                return this.profileMap[userId]?.initials || '??';
            },
            toggleComments(userId) {
                this.expandedUser = this.expandedUser === userId ? null : userId;
            },
            showToast(msg) {
                this.toast = msg;
                setTimeout(() => { this.toast = ''; }, 2500);
            },
            async toggleLike(targetUserId) {
                if (!this.session || this.socialUnavailable) return;
                this.socialBusy = true;
                const key = FitnessSocial.likeKey(targetUserId, this.metric);
                try {
                    if (this.myLikeKeys.has(key)) {
                        await _client.from('arena_likes').delete()
                            .eq('target_user_id', targetUserId)
                            .eq('actor_user_id', this.session.user.id)
                            .eq('context', this.metric);
                    } else {
                        await _client.from('arena_likes').insert({
                            target_user_id: targetUserId,
                            actor_user_id: this.session.user.id,
                            context: this.metric
                        });
                    }
                    await this.fetchSocial();
                } catch (e) {
                    console.error(e);
                    this.showToast('Could not update cheer');
                }
                this.socialBusy = false;
            },
            async postComment(targetUserId) {
                const body = (this.commentDraft[targetUserId] || '').trim();
                if (!FitnessSocial.commentHasContent(body) || !this.session || this.socialUnavailable) return;
                this.socialBusy = true;
                try {
                    const row = {
                        target_user_id: targetUserId,
                        author_user_id: this.session.user.id,
                        context: this.metric,
                        body
                    };
                    if (this.replyParent[targetUserId]) row.parent_id = this.replyParent[targetUserId];
                    const { error } = await _client.from('arena_comments').insert(row);
                    if (error) throw error;
                    this.commentDraft[targetUserId] = '';
                    this.replyParent[targetUserId] = null;
                    this.expandedUser = targetUserId;
                    await this.fetchSocial();
                } catch (e) {
                    console.error(e);
                    this.showToast('Could not post comment');
                }
                this.socialBusy = false;
            },
            async toggleCommentLike(commentId) {
                if (!this.session || this.socialUnavailable) return;
                this.socialBusy = true;
                try {
                    if (this.myCommentLikes.has(commentId)) {
                        await _client.from('arena_comment_likes').delete().eq('comment_id', commentId).eq('actor_user_id', this.session.user.id);
                    } else {
                        await _client.from('arena_comment_likes').insert({ comment_id: commentId, actor_user_id: this.session.user.id });
                    }
                    await this.fetchSocial();
                } catch (e) {
                    console.error(e);
                    this.showToast('Could not update like');
                }
                this.socialBusy = false;
            },
            async deleteComment(comment) {
                if (!this.session || comment.author_user_id !== this.session.user.id) return;
                this.socialBusy = true;
                try {
                    const { error } = await _client.from('arena_comments').delete().eq('id', comment.id);
                    if (error) throw error;
                    await this.fetchSocial();
                } catch (e) {
                    console.error(e);
                    this.showToast('Could not delete comment');
                }
                this.socialBusy = false;
            },
            async shareStreak(user) {
                const name = user.full_name || this.profileMap[user.user_id]?.full_name || 'Athlete';
                const result = await FitnessSocial.shareStreakCard({
                    athleteName: name,
                    streakDays: user.current_streak
                });
                if (result === 'shared-image') this.showToast('Streak card sent!');
                else if (result === 'clipboard') this.showToast('Streak recap copied!');
            },
            async shareRanking(user, rank) {
                const name = user.full_name || 'Athlete';
                const result = await FitnessSocial.shareRankingCard({
                    athleteName: name,
                    rank,
                    metric: this.metric,
                    score: this.getScore(user),
                    unit: this.getUnit(),
                    metricLabel: this.getMetricLabel()
                });
                if (result === 'shared-image') this.showToast('Rank card sent!');
                else if (result === 'clipboard') this.showToast('Ranking recap copied!');
            },
            getScore(user) {
                if (this.metric === 'volume') return this.formatNumber(user.total_volume);
                if (this.metric === 'sessions') return user.sessions_count;
                return user.current_streak;
            },
            getUnit() {
                if (this.metric === 'volume') return 'LBS';
                if (this.metric === 'sessions') return 'SESSIONS';
                return 'DAYS';
            },
            getMetricLabel() {
                if (this.metric === 'volume') return 'Total Load';
                if (this.metric === 'sessions') return 'Sessions';
                return 'Active Streak';
            },
            formatNumber(num) {
                return FitnessSocial.formatNumber(num);
            },
            renderCommentHtml(body) {
                return FitnessSocial.renderCommentHtml(body);
            },
            canPostComment(userId) {
                return FitnessSocial.commentHasContent(this.commentDraft[userId] || '');
            },
            commentDraftPreview(userId) {
                const { gifIds } = FitnessSocial.parseCommentBody(this.commentDraft[userId] || '');
                return gifIds.length ? FitnessSocial.gifCommentUrl(gifIds[0]) : null;
            },
            giphyConfigured() {
                return !!FitnessSocial.giphyApiKey();
            },
            openGifPicker(userId) {
                if (!this.giphyConfigured()) {
                    this.showToast('Add GIPHY API key in js/giphy-config.js');
                    return;
                }
                this.gifPickerTarget = userId;
                this.gifSearch = '';
                this.loadGifs('');
            },
            closeGifPicker() {
                this.gifPickerTarget = null;
                this.gifResults = [];
                this.gifSearch = '';
                if (this.gifSearchTimer) clearTimeout(this.gifSearchTimer);
            },
            onGifSearchInput() {
                if (this.gifSearchTimer) clearTimeout(this.gifSearchTimer);
                this.gifSearchTimer = setTimeout(() => this.loadGifs(this.gifSearch), 350);
            },
            async loadGifs(query) {
                if (!this.giphyConfigured()) return;
                this.gifLoading = true;
                try {
                    this.gifResults = await FitnessSocial.searchGifs(query);
                } catch (e) {
                    console.error(e);
                    this.gifResults = [];
                    this.showToast('GIF search failed');
                }
                this.gifLoading = false;
            },
            selectGif(gif) {
                const uid = this.gifPickerTarget;
                if (!uid || !gif?.id) return;
                const parsed = FitnessSocial.parseCommentBody(this.commentDraft[uid] || '');
                this.commentDraft[uid] = FitnessSocial.encodeGifComment(gif.id, parsed.text);
                this.closeGifPicker();
            },
            getRankClass(index) {
                if (index === 0) return 'rank-1 glass border-yellow-500/30';
                if (index === 1) return 'rank-2 glass border-slate-400/30';
                if (index === 2) return 'rank-3 glass border-orange-500/30';
                return 'glass border-white/5 opacity-80';
            },
            getRankColor(index) {
                if (index === 0) return 'gold-text';
                if (index === 1) return 'silver-text';
                if (index === 2) return 'bronze-text';
                return 'text-slate-600';
            },
            async fetchPrFeed() {
                const result = await FitnessArenaPrs.fetchWeeklyFeed(_client, this.profileMap);
                if (result.tableMissing) {
                    this.prSocialUnavailable = true;
                    this.prEvents = [];
                    return;
                }
                if (Array.isArray(result)) {
                    this.prEvents = result;
                } else {
                    this.prEvents = result.events || [];
                    this.prComputedFallback = !!result.computedFallback;
                }
                await this.fetchPrSocial();
            },
            async fetchPrSocial() {
                if (this.prSocialUnavailable || !this.session) return;
                const [likesRes, commentsRes, clRes] = await Promise.all([
                    _client.from('arena_pr_likes').select('id, pr_id, actor_user_id'),
                    _client.from('arena_pr_comments').select('id, pr_id, author_user_id, parent_id, body, created_at').order('created_at', { ascending: true }),
                    _client.from('arena_pr_comment_likes').select('comment_id, actor_user_id')
                ]);
                if (likesRes.error?.code === '42P01') {
                    this.prSocialUnavailable = true;
                    return;
                }
                this.prLikes = likesRes.data || [];
                this.prComments = commentsRes.data || [];
                const clState = FitnessSocial.buildCommentLikeState(clRes.data || [], this.session.user.id);
                this.prCommentLikeCounts = clState.counts;
                this.myPrCommentLikes = clState.mine;
                const mine = new Set();
                this.prLikes.forEach(r => {
                    if (r.actor_user_id === this.session.user.id) mine.add(r.pr_id);
                });
                this.myPrLikes = mine;
            },
            prName(uid) { return this.profileMap[uid]?.full_name || 'Athlete'; },
            prInitials(uid) { return this.profileMap[uid]?.initials || '??'; },
            prFormatWhen(iso) { return FitnessSocial.formatCommentTime(iso); },
            prDelta(pr) { return FitnessArenaPrs.formatPrDelta(pr.weight, pr.previous_weight); },
            isPrLiked(prId) { return this.myPrLikes.has(prId); },
            prLikeCount(prId) { return this.prLikeCounts[prId] || 0; },
            prCommentCount(prId) { return (this.prCommentsByPr[prId] || []).length; },
            commentThreadsForPr(prId) {
                return FitnessSocial.buildCommentThreads(this.prCommentsByPr[prId] || []);
            },
            isPrCommentLiked(id) { return this.myPrCommentLikes.has(id); },
            prCommentLikeCount(id) { return this.prCommentLikeCounts?.[id] || 0; },
            togglePrComments(prId) { this.expandedPr = this.expandedPr === prId ? null : prId; },
            startPrReply(prId, parentId) {
                this.prReplyParent[prId] = parentId;
                this.expandedPr = prId;
            },
            canPostPrComment(prId) {
                return FitnessSocial.commentHasContent(this.prCommentDraft[prId] || '');
            },
            async togglePrLike(pr) {
                if (!this.session || this.socialBusy || pr._computed) return;
                this.socialBusy = true;
                try {
                    if (this.myPrLikes.has(pr.id)) {
                        await _client.from('arena_pr_likes').delete().eq('pr_id', pr.id).eq('actor_user_id', this.session.user.id);
                    } else {
                        await _client.from('arena_pr_likes').insert({ pr_id: pr.id, actor_user_id: this.session.user.id });
                    }
                    await this.fetchPrSocial();
                } catch (e) { console.error(e); }
                this.socialBusy = false;
            },
            async togglePrCommentLike(commentId) {
                if (!this.session || this.socialBusy) return;
                this.socialBusy = true;
                try {
                    if (this.myPrCommentLikes.has(commentId)) {
                        await _client.from('arena_pr_comment_likes').delete().eq('comment_id', commentId).eq('actor_user_id', this.session.user.id);
                    } else {
                        await _client.from('arena_pr_comment_likes').insert({ comment_id: commentId, actor_user_id: this.session.user.id });
                    }
                    await this.fetchPrSocial();
                } catch (e) { console.error(e); }
                this.socialBusy = false;
            },
            async postPrComment(prId) {
                const body = (this.prCommentDraft[prId] || '').trim();
                if (!FitnessSocial.commentHasContent(body) || !this.session) return;
                this.socialBusy = true;
                try {
                    const row = {
                        pr_id: prId,
                        author_user_id: this.session.user.id,
                        body
                    };
                    if (this.prReplyParent[prId]) row.parent_id = this.prReplyParent[prId];
                    const { error } = await _client.from('arena_pr_comments').insert(row);
                    if (error) throw error;
                    this.prCommentDraft[prId] = '';
                    this.prReplyParent[prId] = null;
                    this.expandedPr = prId;
                    await this.fetchPrSocial();
                } catch (e) { console.error(e); }
                this.socialBusy = false;
            }
        }
    }).mount('#app');
</script>
</body>
